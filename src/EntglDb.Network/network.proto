syntax = "proto3";

package EntglDb.Network.Proto;

option csharp_namespace = "EntglDb.Network.Proto";

message HandshakeRequest {
  string node_id = 1;
  string auth_token = 2;
  repeated string supported_compression = 3; // v4
  repeated string interesting_collections = 4; // v5
}

message HandshakeResponse {
  string node_id = 1;
  bool accepted = 2;
  string selected_compression = 3; // v4
  repeated string interesting_collections = 4; // v5
}

// Enum for wire framing (1 byte on the wire)
// Range 0-2: reserved for transport/handshake
// Range 3-15: reserved for EntglDb.Sync (see SyncMessageType in EntglDb.Sync)
// Range 16-31: reserved for future core services
// Range 32+: available for custom service extensions
enum MessageType {
  Unknown = 0;
  HandshakeReq = 1;
  HandshakeRes = 2;
  SecureEnv = 9;
}

message SecureEnvelope {
  bytes ciphertext = 1; // Encrypted payload
  bytes nonce = 2;      // IV or Nonce
  bytes auth_tag = 3;   // HMAC or Auth Tag if using AEAD (optional if concatenated)
}
